<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Space Explorer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif;color:white}#gameContainer{position:relative;width:400px;height:600px}#gameCanvas{border:2px solid #333;background:#000033}#score{position:absolute;top:10px;right:10px;color:#fff;font-size:20px;font-weight:bold}#gameOver{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:20px;border-radius:10px;text-align:center}#gameOver h2{font-size:32px;margin-bottom:20px;color:#ff4444}#gameOver p{margin-bottom:20px;font-size:20px}#gameOver button{padding:10px 20px;font-size:18px;background:#4CAF50;border:none;color:white;border-radius:5px;cursor:pointer}#gameOver button:hover{background:#45a049}</style></head><body><div id="gameContainer"><canvas id="gameCanvas" width="400" height="600"></canvas><div id="score">Score: 0</div><div id="gameOver"><h2>Game Over!</h2><p>Final Score: <span id="finalScore">0</span></p><button onclick="restartGame()">Play Again</button></div></div><script src="js/game.js"></script></body></html>
