<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Space Explorer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial,sans-serif}#gameContainer{position:relative;width:400px;height:600px}#gameCanvas{border:2px solid #333;background:#000033}#score{position:absolute;top:10px;left:10px;color:#fff;font-size:20px;font-weight:bold}.game-over{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center}.game-over h2{font-size:32px;margin-bottom:20px}.game-over button{padding:10px 20px;font-size:18px;background:#4CAF50;border:none;color:white;border-radius:5px;cursor:pointer}.game-over button:hover{background:#45a049}</style></head><body><div id="gameContainer"><canvas id="gameCanvas" width="400" height="600"></canvas><div id="score">Score: 0</div><div class="game-over" id="gameOver"><h2>Game Over!</h2><p>Final Score: <span id="finalScore">0</span></p><button onclick="restartGame()">Play Again</button></div></div><script src="js/game.js"></script></body></html>
