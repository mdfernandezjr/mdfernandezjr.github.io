<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PDF to Word Converter</title><link rel="stylesheet" href="static/style.css"></head><body><div class="container"><header><h1>PDF to Word Converter</h1><p>Convert your PDF documents to Word files instantly</p></header><main><div class="upload-container" id="drop-area"><div class="upload-icon">📄</div><h3>Drop files here or click to upload</h3><p>Supports PDF files up to 10MB</p><input type="file" id="fileInput" accept=".pdf" hidden></div><div class="progress-container" id="progress-container" style="display: none;"><h3>Converting...</h3><div class="progress-bar"><div class="progress" id="progress-bar"></div></div><p id="progress-text">0%</p></div><div class="result-container" id="result-container" style="display: none;"><h3>Conversion Complete</h3><div class="file-info"><div class="file-icon">📄</div><div class="file-details"><h4 id="output-filename">document.docx</h4><p id="output-filesize">0 KB</p></div></div><div class="action-buttons"><button id="download-btn" class="btn primary">Download</button><button id="convert-another-btn" class="btn secondary" onclick="location.reload()">Convert Another</button></div></div></main></div><script src="static/app.js"></script></body></html>
