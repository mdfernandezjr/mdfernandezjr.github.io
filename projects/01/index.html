<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Carnivore Quiz</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6;padding:2rem;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center}.container{max-width:1000px;margin:0 auto;text-align:center}h1{font-size:2rem;margin-bottom:2rem;color:#2d3436}.images-container{display:flex;justify-content:center;gap:2rem;margin-top:2rem}.image-wrapper{position:relative;cursor:pointer;transition:transform 0.3s ease}.image-wrapper:hover{transform:scale(1.02)}.food-image{width:400px;height:300px;object-fit:cover;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,0.1)}.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.8);color:white;display:flex;justify-content:center;align-items:center;font-size:1.5rem;font-weight:bold;opacity:0;transition:opacity 0.3s ease;border-radius:10px}.overlay.show{opacity:1}@media (max-width:900px){.images-container{flex-direction:column;align-items:center}.food-image{width:100%;max-width:400px}}</style></head><body><div class="container"><h1>Which one of these items is carnivore?</h1><div class="images-container"><div class="image-wrapper" onclick="showOverlay(this)"><img src="Images/CarneAsada.jpg" alt="Carne Asada" class="food-image"><div class="overlay">NO, This is not carnivore!</div></div><div class="image-wrapper" onclick="showOverlay(this)"><img src="Images/Empanada.jpg" alt="Empanada" class="food-image"><div class="overlay">NO, This is not carnivore!</div></div></div></div><script>function showOverlay(element){const overlay=element.querySelector(".overlay");overlay.classList.add("show");setTimeout(()=>{overlay.classList.remove("show")},2000)}</script></body></html>
